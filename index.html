<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خلية الحروف - البطولات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #151521;
            --card-bg: #1e1e2d;
            --primary: #ff9800;
            --team-1: #ff7043;
            --team-2: #26a69a;
            --text-light: #ffffff;
            --text-muted: #a1a5b7;
            --border-color: #2b2b40;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 0%, #2a2a40 0%, transparent 50%);
        }

        /* شاشة اللوبي */
        #lobbyScreen { display: flex; flex-direction: column; align-items: center; width: 100%; margin-top: 50px; }
        .lobby-container { display: flex; gap: 20px; margin-bottom: 40px; }
        .team-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; width: 250px; min-height: 200px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .team-header { padding: 15px; text-align: center; font-weight: bold; font-size: 1.2rem; }
        .team-1-header { background: var(--team-1); }
        .team-2-header { background: var(--team-2); color: #fff; }
        .wait-header { background: #3f3f5a; }
        .team-body { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted); }
        .control-panel { background: var(--card-bg); padding: 30px; border-radius: 15px; border: 1px solid var(--border-color); width: 600px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .btn-start { background: var(--primary); color: #fff; border: none; padding: 15px 40px; font-size: 1.5rem; font-weight: bold; border-radius: 10px; cursor: pointer; width: 100%; font-family: 'Cairo', sans-serif; transition: 0.3s; }
        .btn-start:hover { transform: translateY(-3px); opacity: 0.9; }

        /* شاشة اللعبة */
        #gameScreen { display: none; width: 100%; flex-direction: column; align-items: center; padding-top: 20px; }
        .game-header { display: flex; justify-content: space-between; width: 80%; max-width: 900px; margin-bottom: 30px; background: var(--card-bg); padding: 15px 30px; border-radius: 15px; border: 1px solid var(--border-color); }
        .score { font-size: 1.5rem; font-weight: bold; }
        .s-team1 { color: var(--team-1); }
        .s-team2 { color: var(--team-2); }
        .btn-random { background: #9c27b0; color: white; border: none; padding: 12px 30px; font-size: 1.2rem; font-weight: bold; border-radius: 8px; cursor: pointer; font-family: 'Cairo'; margin-bottom: 30px; }

        /* الخلية */
        .honeycomb { display: flex; flex-direction: column; align-items: center; }
        .hex-row { display: flex; margin-bottom: -28px; }
        .hex-row:nth-child(even) { transform: translateX(-55px); }
        .hex { width: 100px; height: 115px; background: #2b2b40; margin: 0 5px; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); display: flex; justify-content: center; align-items: center; font-size: 2rem; font-weight: 900; color: var(--text-muted); transition: all 0.3s ease; position: relative; }
        .hex::after { content: ''; position: absolute; top: 4px; left: 4px; right: 4px; bottom: 4px; background: var(--card-bg); clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); z-index: -1; }
        .hex.active-glow { background: #fff; color: #fff; box-shadow: 0 0 30px #fff; transform: scale(1.1); z-index: 10; }
        .hex.won-team1 { background: var(--team-1); color: #fff; }
        .hex.won-team1::after { background: var(--team-1); }
        .hex.won-team2 { background: var(--team-2); color: #fff; }
        .hex.won-team2::after { background: var(--team-2); }

        /* نافذة السؤال */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: var(--card-bg); padding: 40px; border-radius: 20px; text-align: center; width: 90%; max-width: 600px; border: 2px solid var(--primary); }
        .timer { font-size: 4rem; color: var(--primary); font-weight: bold; margin: 20px 0; }
        .question-text { font-size: 1.8rem; margin: 20px 0; line-height: 1.5; display: none; }
        .input-area { display: none; flex-direction: column; gap: 15px; margin-top: 20px; }
        .answer-input { padding: 15px; font-size: 1.2rem; border-radius: 10px; border: 2px solid var(--border-color); background: var(--bg-dark); color: white; text-align: center; font-family: 'Cairo'; width: 90%; margin: 0 auto; }
        .answer-input:disabled { opacity: 0.5; cursor: not-allowed; }
        .assign-btns { display: none; justify-content: space-between; gap: 10px; margin-top: 15px; }
        .assign-btns button { flex: 1; padding: 10px; font-size: 1.1rem; border: none; border-radius: 8px; cursor: pointer; color: white; font-family: 'Cairo'; font-weight: bold;}
        .btn-t1 { background: var(--team-1); }
        .btn-t2 { background: var(--team-2); }
    </style>
</head>
<body>

    <div id="lobbyScreen">
        <h1 style="color: var(--primary); margin-bottom: 40px; font-size: 3rem;">خـلـيـة الـحـروف</h1>
        <div class="lobby-container">
            <div class="team-card"><div class="team-header team-1-header">الفريق الأول (البرتقالي)</div><div class="team-body">جاهز للتحدي</div></div>
            <div class="team-card"><div class="team-header wait-header">قائمة الانتظار</div><div class="team-body" style="color: #fff; font-size: 1.2rem;">عمي mo (المضيف) 👑</div></div>
            <div class="team-card"><div class="team-header team-2-header">الفريق الثاني (الأزرق)</div><div class="team-body">جاهز للتحدي</div></div>
        </div>
        <div class="control-panel">
            <button class="btn-start" onclick="startGame()">🚀 ابدأ اللعبة</button>
        </div>
    </div>

    <div id="gameScreen">
        <div class="game-header">
            <div class="score s-team1">الفريق الأول: <span id="score1">0</span></div>
            <button class="btn-random" id="randomBtn" onclick="pickRandomLetter()">🎲 اختيار حرف عشوائي</button>
            <div class="score s-team2">الفريق الثاني: <span id="score2">0</span></div>
        </div>
        <div class="honeycomb" id="board"></div>
    </div>

    <div class="modal" id="qModal">
        <div class="modal-content">
            <h2 id="modalLetter" style="color: var(--primary); font-size: 3rem; margin: 0;">أ</h2>
            <div class="timer" id="countdown">3</div>
            <div class="question-text" id="qText">السؤال سيظهر هنا...</div>
            <div class="input-area" id="inputArea">
                <input type="text" id="answerInput" class="answer-input" placeholder="اكتب الإجابة هنا..." disabled>
                <div id="statusMsg" style="color: #ff5252; font-weight: bold;"></div>
                <div class="assign-btns" id="assignBtns">
                    <p style="width: 100%; text-align: center; color: white;">إجابة صحيحة! لمن النقطة؟</p>
                    <button class="btn-t1" onclick="awardPoint('t1')">للفريق الأول</button>
                    <button class="btn-t2" onclick="awardPoint('t2')">للفريق الثاني</button>
                </div>
            </div>
            <button style="margin-top: 20px; padding: 10px 20px; background: #555; border: none; color: white; border-radius: 5px; cursor: pointer; font-family: 'Cairo';" onclick="closeModal()">إغلاق</button>
        </div>
    </div>

    <script>
        const allLetters = ['أ','ب','ت','ث','ج','ح','خ','د','ذ','ر','ز','س','ش','ص','ض','ط','ظ','ع','غ','ف','ق','ك','ل','م','ن','هـ','و','ي'];
        let availableLetters = [...allLetters];
        let currentLetter = '';
        let currentAnswer = '';
        let currentCell = null;
        let scores = { t1: 0, t2: 0 };
        let questionsDB = {};

        // جلب الأسئلة من ملف questions.json
        fetch('questions.json')
            .then(response => response.json())
            .then(data => { questionsDB = data; console.log("تم تحميل الأسئلة بنجاح!"); })
            .catch(error => console.error("خطأ في تحميل الأسئلة:", error));

        // بناء لوحة الحروف
        const board = document.getElementById('board');
        let letterIndex = 0;
        for (let r = 0; r < 4; r++) {
            let row = document.createElement('div');
            row.className = 'hex-row';
            for (let c = 0; c < 7; c++) {
                if (letterIndex < allLetters.length) {
                    let l = allLetters[letterIndex];
                    let hex = document.createElement('div');
                    hex.className = 'hex';
                    hex.id = 'hex-' + l;
                    hex.textContent = l;
                    row.appendChild(hex);
                    letterIndex++;
                }
            }
            board.appendChild(row);
        }

        function startGame() {
            document.getElementById('lobbyScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'flex';
        }

        function pickRandomLetter() {
            if (availableLetters.length === 0) { alert("انتهت جميع الحروف!"); return; }
            document.getElementById('randomBtn').disabled = true;
            
            let flashCount = 0;
            let flashInterval = setInterval(() => {
                document.querySelectorAll('.hex').forEach(h => h.classList.remove('active-glow'));
                let randomTemp = availableLetters[Math.floor(Math.random() * availableLetters.length)];
                document.getElementById('hex-' + randomTemp).classList.add('active-glow');
                flashCount++;
                
                if (flashCount > 15) {
                    clearInterval(flashInterval);
                    currentLetter = availableLetters[Math.floor(Math.random() * availableLetters.length)];
                    currentCell = document.getElementById('hex-' + currentLetter);
                    document.querySelectorAll('.hex').forEach(h => h.classList.remove('active-glow'));
                    currentCell.classList.add('active-glow');
                    setTimeout(() => startQuestion(currentLetter), 1000);
                }
            }, 100);
        }

        function startQuestion(letter) {
            let questionsForLetter = questionsDB[letter];
            let questionObj = null;

            if (questionsForLetter && questionsForLetter.length > 0) {
                let randomIndex = Math.floor(Math.random() * questionsForLetter.length);
                questionObj = questionsForLetter[randomIndex];
            }

            currentAnswer = questionObj ? questionObj.a : "غير محدد";
            let question = questionObj ? questionObj.q : "لا يوجد أسئلة مسجلة لهذا الحرف!";
            
            document.getElementById('modalLetter').textContent = letter;
            document.getElementById('qText').textContent = question;
            document.getElementById('qText').style.display = 'none';
            document.getElementById('inputArea').style.display = 'none';
            document.getElementById('assignBtns').style.display = 'none';
            document.getElementById('statusMsg').textContent = '';
            
            let input = document.getElementById('answerInput');
            input.value = '';
            input.disabled = true;
            
            document.getElementById('qModal').style.display = 'flex';
            
            let timerEl = document.getElementById('countdown');
            timerEl.style.display = 'block';
            let count = 3;
            timerEl.textContent = count;
            
            let countdown = setInterval(() => {
                count--;
                if (count > 0) {
                    timerEl.textContent = count;
                } else {
                    clearInterval(countdown);
                    timerEl.style.display = 'none';
                    document.getElementById('qText').style.display = 'block';
                    document.getElementById('inputArea').style.display = 'flex';
                    input.disabled = false;
                    input.focus();
                }
            }, 1000);
        }

        document.getElementById('answerInput').addEventListener('input', function(e) {
            let val = e.target.value.trim();
            if (val === currentAnswer) {
                e.target.disabled = true;
                e.target.style.borderColor = '#4CAF50';
                document.getElementById('statusMsg').style.color = '#4CAF50';
                document.getElementById('statusMsg').textContent = 'إجابة صحيحة بالملي!';
                document.getElementById('assignBtns').style.display = 'flex';
            } else if (val.length >= currentAnswer.length) {
                document.getElementById('statusMsg').textContent = 'إجابة خاطئة، حاول مرة أخرى!';
            } else {
                document.getElementById('statusMsg').textContent = '';
            }
        });

        function awardPoint(team) {
            if (team === 't1') {
                currentCell.classList.add('won-team1');
                scores.t1++;
                document.getElementById('score1').textContent = scores.t1;
            } else {
                currentCell.classList.add('won-team2');
                scores.t2++;
                document.getElementById('score2').textContent = scores.t2;
            }
            availableLetters = availableLetters.filter(l => l !== currentLetter);
            closeModal();
        }

        function closeModal() {
            document.getElementById('qModal').style.display = 'none';
            document.getElementById('randomBtn').disabled = false;
            if(currentCell) currentCell.classList.remove('active-glow');
        }

        // حماية الصفحة F12
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.key === 'F12' || e.keyCode === 123) e.preventDefault();
            if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.keyCode === 73)) e.preventDefault();
            if (e.ctrlKey && e.shiftKey && (e.key === 'J' || e.key === 'j' || e.keyCode === 74)) e.preventDefault();
            if (e.ctrlKey && (e.key === 'U' || e.key === 'u' || e.keyCode === 85)) e.preventDefault();
            if (e.ctrlKey && e.shiftKey && (e.key === 'C' || e.key === 'c' || e.keyCode === 67)) e.preventDefault();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خلية الحروف - Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #12141d;
            --panel-bg: #1c1f2e;
            --primary-orange: #f28b32;
            --primary-orange-dark: #cc6c1e;
            --primary-teal: #4b9b94;
            --hex-text: #2a2342;
            --text-light: #ffffff;
            --text-muted: #8b92a5;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark); 
            color: var(--text-light);
            font-family: 'Cairo', sans-serif;
            min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
            /* خلفية احترافية سداسية خفيفة تشبه الصورة */
            background-image: radial-gradient(circle at 50% 0%, #1c1f2e 0%, transparent 70%);
        }

        /* --- شاشة اللعبة --- */
        .game-header {
            display: flex; justify-content: center; align-items: center; gap: 20px;
            margin-top: 40px; margin-bottom: 50px;
        }

        .score-pill {
            background: var(--panel-bg); border: 1px solid #2d3345;
            padding: 5px 15px 5px 5px; border-radius: 50px;
            display: flex; align-items: center; gap: 15px; font-weight: bold; font-size: 1.2rem;
        }
        .score-pill span { color: var(--text-muted); font-size: 1rem;}
        .score-num {
            background: var(--primary-orange); color: #000;
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; font-weight: 900;
        }
        .score-num.teal { background: var(--primary-teal); color: #fff; }

        .btn-random {
            background: #2a2342; border: 1px solid var(--primary-orange); color: var(--primary-orange);
            padding: 10px 20px; border-radius: 10px; font-family: 'Cairo'; font-weight: bold; cursor: pointer;
            transition: 0.3s;
        }
        .btn-random:hover { background: var(--primary-orange); color: #000; }

        /* --- الخلية --- */
        .honeycomb { display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .hex-row { display: flex; justify-content: center; margin-bottom: -22px; }
        
        .hex-wrap {
            position: relative; width: 85px; height: 98px; margin: 0 2px; cursor: pointer; transition: all 0.3s ease;
        }
        .hex-border {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #453b60;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        }
        .hex-inner {
            position: absolute; top: 3px; left: 3px; right: 3px; bottom: 3px; background: #ffffff;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex; justify-content: center; align-items: center;
            font-size: 2.2rem; font-weight: 900; color: var(--hex-text); transition: all 0.3s;
        }
        .hex-wrap:hover { transform: scale(1.1); z-index: 10; }

        /* --- نافذة السؤال (نفس الصورة بالضبط) --- */
        .modal {
            display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 11, 16, 0.9); justify-content: center; align-items: center; z-index: 1000;
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background: var(--panel-bg); padding: 40px; border-radius: 20px; text-align: center;
            width: 90%; max-width: 600px; border: 1px solid #2d3345; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; align-items: center; position: relative;
        }

        /* الأيقونة السداسية ثلاثية الأبعاد فوق النافذة */
        .hex-icon-3d {
            width: 80px; height: 90px; background: linear-gradient(to bottom, var(--primary-orange), var(--primary-orange-dark));
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex; justify-content: center; align-items: center;
            font-size: 3rem; font-weight: 900; color: #fff;
            position: absolute; top: -45px;
            box-shadow: inset 0 -5px 15px rgba(0,0,0,0.5), 0 10px 20px rgba(242, 139, 50, 0.5);
            text-shadow: 2px 2px 0px rgba(0,0,0,0.3);
        }

        .q-label { color: var(--primary-orange); font-weight: bold; font-size: 1.1rem; margin-top: 30px; }
        .question-text { font-size: 1.8rem; margin: 15px 0 30px 0; color: #fff; line-height: 1.5; font-weight: bold;}
        
        .answer-input {
            padding: 15px; font-size: 1.2rem; border-radius: 10px; border: 1px solid #3a4156;
            background: #12141d; color: white; text-align: center; font-family: 'Cairo'; width: 90%; margin-bottom: 20px;
        }
        .answer-input:focus { outline: none; border-color: var(--primary-orange); }

        .btn-submit {
            background: linear-gradient(to bottom, var(--primary-orange), var(--primary-orange-dark));
            color: #fff; border: none; padding: 15px; font-size: 1.3rem; font-weight: bold; border-radius: 10px;
            width: 95%; cursor: pointer; font-family: 'Cairo'; box-shadow: 0 5px 15px rgba(242, 139, 50, 0.3);
            transition: 0.2s; margin-bottom: 15px;
        }
        .btn-submit:hover { transform: translateY(-2px); }

        .action-bar { display: flex; justify-content: space-between; gap: 10px; width: 95%; }
        .btn-secondary {
            background: #2d3345; flex: 1; padding: 12px; border: none; color: var(--text-muted);
            border-radius: 8px; font-family: 'Cairo'; cursor: pointer; font-size: 1rem; font-weight: bold; transition: 0.2s;
        }
        .btn-secondary:hover { color: #fff; background: #3a4156; }
        .btn-skip { color: #d9534f; }
        .btn-skip:hover { background: #d9534f; color: #fff; }

    </style>
</head>
<body>

    <div class="game-header">
        <div class="score-pill">
            <div class="score-num">0</div>
            الفريق الأول <span>جولة 1</span>
        </div>
        <button class="btn-random">توزيع عشوائي 🎲</button>
        <div class="score-pill">
            <span>الفريق الثاني</span>
            <div class="score-num teal">0</div>
        </div>
    </div>

    <div class="honeycomb" id="board">
        <div class="hex-row">
            <div class="hex-wrap"><div class="hex-border"></div><div class="hex-inner">ح</div></div>
            <div class="hex-wrap"><div class="hex-border"></div><div class="hex-inner">ذ</div></div>
            <div class="hex-wrap"><div class="hex-border"></div><div class="hex-inner">غ</div></div>
            <div class="hex-wrap"><div class="hex-border"></div><div class="hex-inner">ع</div></div>
            <div class="hex-wrap"><div class="hex-border"></div><div class="hex-inner">خ</div></div>
        </div>
        <div class="hex-row">
            <div class="hex-wrap"><div class="hex-border"></div><div class="hex-inner">ز</div></div>
            <div class="hex-wrap"><div class="hex-border"></div><div class="hex-inner">م</div></div>
            <div class="hex-wrap"><div class="hex-border"></div><div class="hex-inner">ر</div></div>
            <div class="hex-wrap"><div class="hex-border"></div><div class="hex-inner">ق</div></div>
        </div>
        <div class="hex-row">
            <div class="hex-wrap"><div class="hex-border"></div><div class="hex-inner">ج</div></div>
            <div class="hex-wrap"><div class="hex-border"></div><div class="hex-inner">ب</div></div>
            <div class="hex-wrap"><div class="hex-border"></div><div class="hex-inner">ت</div></div>
            <div class="hex-wrap"><div class="hex-border"></div><div class="hex-inner">د</div></div>
            <div class="hex-wrap"><div class="hex-border"></div><div class="hex-inner">ط</div></div>
        </div>
    </div>

    <div class="modal" id="qModal">
        <div class="modal-content">
            <div class="hex-icon-3d">و</div>
            
            <div class="q-label">سؤال إجابته بحرف الـ و</div>
            <div class="question-text" id="qText">هو الكلام الخفي الذي يتضمن الدعاء إلى الفساد .</div>
            
            <input type="text" class="answer-input" placeholder="اكتب الإجابة هنا...">
            
            <button class="btn-submit">إرسال الإجابة 🚀</button>
            
            <div class="action-bar">
                <button class="btn-secondary btn-skip">تغيير السؤال (1/2) 🔄</button>
                <button class="btn-secondary" onclick="document.getElementById('qModal').style.display='none'">إلغاء النافذة</button>
            </div>
        </div>
    </div>

</body>
</html>

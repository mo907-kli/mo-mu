<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خلية الحروف - لعب جماعي أونلاين</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #12141d; --panel-bg: #1c1f2e;
            --primary-orange: #f28b32; --primary-teal: #4b9b94;
            --text-light: #ffffff; --text-muted: #8b92a5;
        }

        body {
            margin: 0; padding: 0; background-color: var(--bg-dark); color: var(--text-light);
            font-family: 'Cairo', sans-serif; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            background-image: radial-gradient(circle at 50% 0%, #1c1f2e 0%, transparent 70%);
        }

        /* --- شاشة الدخول وإنشاء الغرف --- */
        #authScreen { display: flex; flex-direction: column; align-items: center; margin-top: 100px; width: 100%;}
        .auth-box {
            background: var(--panel-bg); padding: 40px; border-radius: 20px; width: 90%; max-width: 400px;
            text-align: center; border: 1px solid #2d3345; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .auth-box h1 { color: var(--primary-orange); margin-bottom: 30px; font-size: 2.5rem; text-shadow: 0 0 15px rgba(242, 139, 50, 0.4);}
        .auth-input {
            width: 90%; padding: 15px; border-radius: 10px; border: 1px solid #3a4156;
            background: #12141d; color: white; text-align: center; font-family: 'Cairo'; font-size: 1.2rem; font-weight: bold; margin-bottom: 20px;
        }
        .btn-auth {
            background: linear-gradient(to bottom, var(--primary-orange), #cc6c1e); color: #fff;
            border: none; padding: 15px; font-size: 1.2rem; font-weight: bold; border-radius: 10px;
            width: 100%; cursor: pointer; font-family: 'Cairo'; margin-bottom: 10px; transition: 0.2s;
        }
        .btn-auth:hover { transform: translateY(-2px); }
        .btn-join { background: #2d3345; }
        .btn-join:hover { background: #3a4156; }

        /* --- شاشة اللعبة --- */
        #gameScreen { display: none; width: 100%; flex-direction: column; align-items: center; }
        .room-code-display { background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 10px; margin-top: 20px; font-weight: bold; color: var(--primary-teal); letter-spacing: 2px;}
        
        .game-header { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 20px; margin-bottom: 40px; }
        .score-pill { background: var(--panel-bg); border: 1px solid #2d3345; padding: 5px 15px 5px 5px; border-radius: 50px; display: flex; align-items: center; gap: 15px; font-weight: bold; font-size: 1.2rem; }
        .score-num { background: var(--primary-orange); color: #000; width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: 900; }
        .score-num.teal { background: var(--primary-teal); color: #fff; }

        /* --- الخلية --- */
        .honeycomb { display: flex; flex-direction: column; align-items: center; }
        .hex-row { display: flex; justify-content: center; margin-bottom: -22px; }
        .hex-wrap { position: relative; width: 85px; height: 98px; margin: 0 2px; cursor: pointer; transition: all 0.3s ease; }
        .hex-border { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #453b60; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); transition: 0.3s;}
        .hex-inner { position: absolute; top: 3px; left: 3px; right: 3px; bottom: 3px; background: #ffffff; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); display: flex; justify-content: center; align-items: center; font-size: 2.2rem; font-weight: 900; color: #2a2342; transition: all 0.3s; }
        .hex-wrap:hover { transform: scale(1.1); z-index: 10; }
        
        .hex-wrap.won-t1 .hex-border { background: #fff; box-shadow: 0 0 15px rgba(255,255,255,0.5);}
        .hex-wrap.won-t1 .hex-inner { background: var(--primary-orange); color: #fff; }
        .hex-wrap.won-t2 .hex-border { background: #fff; box-shadow: 0 0 15px rgba(255,255,255,0.5);}
        .hex-wrap.won-t2 .hex-inner { background: var(--primary-teal); color: #fff; }

        .notification { position: fixed; bottom: 20px; background: #4CAF50; color: white; padding: 15px 30px; border-radius: 10px; font-weight: bold; display: none; z-index: 2000; animation: fadeUp 0.3s;}
        @keyframes fadeUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <div id="authScreen">
        <div class="auth-box">
            <h1>خلية الحروف</h1>
            <input type="text" id="playerName" class="auth-input" placeholder="اكتب اسمك هنا...">
            <button class="btn-auth" id="btnCreateRoom">إنشاء غرفة جديدة ➕</button>
            <div style="margin: 20px 0; color: var(--text-muted);">أو انضم لغرفة</div>
            <input type="text" id="roomCodeInput" class="auth-input" placeholder="كود الغرفة...">
            <button class="btn-auth btn-join" id="btnJoinRoom">انضم إلى الغرفة 🚪</button>
        </div>
    </div>

    <div id="gameScreen">
        <div class="room-code-display" id="displayRoomCode">كود الغرفة: ----</div>
        
        <div class="game-header">
            <div class="score-pill" style="cursor: pointer;" id="team1Box">
                <div class="score-num" id="scoreT1">0</div>
                الفريق الأول
            </div>
            <div class="score-pill" style="cursor: pointer;" id="team2Box">
                الفريق الثاني
                <div class="score-num teal" id="scoreT2">0</div>
            </div>
        </div>

        <div class="honeycomb" id="board">
            </div>
    </div>

    <div class="notification" id="notif">تمت العملية بنجاح</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // إعداداتك اللي أرسلتها بالملي
        const firebaseConfig = {
            apiKey: "AIzaSyC5U1iJdaqEFcrslw2w1ET_23gPo8vSuIo",
            authDomain: "rof-f756a.firebaseapp.com",
            projectId: "rof-f756a",
            storageBucket: "rof-f756a.firebasestorage.app",
            messagingSenderId: "354363701294",
            appId: "1:354363701294:web:07d38e0bfbf51ac81387bf",
            measurementId: "G-S3ESGBXTN1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentRoom = null;
        let myName = "";

        // توليد الحروف
        const allLetters = ['أ','ب','ت','ث','ج','ح','خ','د','ذ','ر','ز','س','ش','ص','ض','ط','ظ','ع','غ','ف','ق','ك','ل','م','ن','هـ','و','ي'];
        const rowLayout = [6, 5, 6, 5, 6];
        
        function initBoardUI() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            let letterIdx = 0;
            rowLayout.forEach(count => {
                let row = document.createElement('div');
                row.className = 'hex-row';
                for (let i = 0; i < count; i++) {
                    if (letterIdx < allLetters.length) {
                        let l = allLetters[letterIdx];
                        let wrap = document.createElement('div');
                        wrap.className = 'hex-wrap';
                        wrap.id = 'hex-' + l;
                        wrap.innerHTML = `<div class="hex-border"></div><div class="hex-inner">${l}</div>`;
                        
                        // عند الضغط على الخلية (تغيير اللون وتزامنه)
                        wrap.onclick = () => handleCellClick(l);
                        
                        row.appendChild(wrap);
                        letterIdx++;
                    }
                }
                board.appendChild(row);
            });
        }

        function showNotif(msg, isError = false) {
            const notif = document.getElementById('notif');
            notif.textContent = msg;
            notif.style.background = isError ? '#ff3b30' : '#4CAF50';
            notif.style.display = 'block';
            setTimeout(() => notif.style.display = 'none', 3000);
        }

        // --- إنشاء غرفة جديدة ---
        document.getElementById('btnCreateRoom').onclick = async () => {
            myName = document.getElementById('playerName').value.trim() || 'المضيف';
            currentRoom = Math.random().toString(36).substring(2, 8).toUpperCase(); // كود من 6 أحرف
            
            let initialBoard = {};
            allLetters.forEach(l => initialBoard[l] = "empty");

            await set(ref(db, 'rooms/' + currentRoom), {
                host: myName,
                scores: { t1: 0, t2: 0 },
                board: initialBoard
            });

            enterRoom();
        };

        // --- الانضمام لغرفة ---
        document.getElementById('btnJoinRoom').onclick = async () => {
            myName = document.getElementById('playerName').value.trim() || 'لاعب';
            let code = document.getElementById('roomCodeInput').value.trim().toUpperCase();
            
            if(!code) return showNotif("اكتب كود الغرفة أولاً", true);

            const snapshot = await get(ref(db, 'rooms/' + code));
            if (snapshot.exists()) {
                currentRoom = code;
                enterRoom();
            } else {
                showNotif("الغرفة غير موجودة! تأكد من الكود.", true);
            }
        };

        function enterRoom() {
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'flex';
            document.getElementById('displayRoomCode').textContent = "كود الغرفة: " + currentRoom;
            
            initBoardUI();
            listenToRoomUpdates();
            showNotif("تم دخول الغرفة بنجاح!");
        }

        // --- التزامن اللحظي مع Firebase ---
        function listenToRoomUpdates() {
            const roomRef = ref(db, 'rooms/' + currentRoom);
            onValue(roomRef, (snapshot) => {
                const data = snapshot.val();
                if(!data) return;

                // تحديث النقاط
                document.getElementById('scoreT1').textContent = data.scores.t1;
                document.getElementById('scoreT2').textContent = data.scores.t2;

                // تحديث ألوان الخلايا
                allLetters.forEach(l => {
                    let cell = document.getElementById('hex-' + l);
                    if(cell) {
                        cell.className = 'hex-wrap'; // إعادة ضبط
                        if(data.board[l] === 't1') cell.classList.add('won-t1');
                        if(data.board[l] === 't2') cell.classList.add('won-t2');
                    }
                });
            });
        }

        // --- تغيير لون الخلية عند الضغط وتزامنه للكل ---
        async function handleCellClick(letter) {
            const snapshot = await get(ref(db, `rooms/${currentRoom}/board/${letter}`));
            let currentState = snapshot.val();
            let newState = "t1"; // الافتراضي

            if(currentState === "empty") newState = "t1";
            else if(currentState === "t1") newState = "t2";
            else if(currentState === "t2") newState = "empty";

            update(ref(db, `rooms/${currentRoom}/board`), { [letter]: newState });
        }

        // --- زيادة النقاط عند الضغط على اسم الفريق ---
        document.getElementById('team1Box').onclick = async () => {
            const snap = await get(ref(db, `rooms/${currentRoom}/scores/t1`));
            update(ref(db, `rooms/${currentRoom}/scores`), { t1: (snap.val() || 0) + 1 });
        };
        
        document.getElementById('team2Box').onclick = async () => {
            const snap = await get(ref(db, `rooms/${currentRoom}/scores/t2`));
            update(ref(db, `rooms/${currentRoom}/scores`), { t2: (snap.val() || 0) + 1 });
        };
    </script>
</body>
</html>

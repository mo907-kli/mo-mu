<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خلية الحروف - Premium Online</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #10121a;
            --box-bg: #1c202d;
            --primary: #f58220;
            --t1-color: #d96c3a; 
            --t2-color: #4a9e9a; 
            --border: #2d3345;
            --text-main: #ffffff;
            --text-muted: #8b92a5;
        }

        body {
            margin: 0; padding: 0; background-color: var(--bg-main); color: var(--text-main);
            font-family: 'Cairo', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            background-image: radial-gradient(circle at top, #1a1e2b 0%, var(--bg-main) 70%);
            overflow-x: hidden;
        }

        .screen { display: none; width: 100%; flex-direction: column; align-items: center; padding-top: 40px; }
        .screen.active { display: flex; }

        .main-logo { color: var(--primary); font-size: 4rem; font-weight: 900; text-shadow: 0 0 25px rgba(245, 130, 32, 0.4); margin-bottom: 30px; text-align: center;}
        .main-logo.small { font-size: 2.5rem; margin-bottom: 20px; }

        /* الصناديق الزجاجية الفخمة */
        .glass-box {
            background: var(--box-bg); border: 1px solid var(--border); border-radius: 20px;
            width: 90%; max-width: 450px; padding: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; gap: 20px; text-align: center;
        }

        .box-header { font-size: 1.2rem; font-weight: bold; color: var(--text-muted); border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .input-wrapper { display: flex; flex-direction: column; gap: 8px; text-align: right; }
        .input-wrapper label { color: var(--text-muted); font-size: 0.9rem; font-weight: bold; }
        .input-wrapper input {
            padding: 15px; border-radius: 10px; border: 2px solid var(--border); background: var(--bg-main);
            color: white; font-family: 'Cairo'; font-size: 1.2rem; font-weight: bold; text-align: center; transition: 0.3s;
        }
        .input-wrapper input:focus { outline: none; border-color: var(--primary); }

        .btn { padding: 15px; border-radius: 10px; font-size: 1.2rem; font-weight: 900; font-family: 'Cairo'; cursor: pointer; transition: 0.3s; border: none; }
        .btn-primary { background: linear-gradient(to bottom, #ff9840, var(--primary)); color: #000; box-shadow: 0 8px 20px rgba(245, 130, 32, 0.3); }
        .btn-primary:hover { transform: translateY(-3px); filter: brightness(1.1); }
        .btn-secondary { background: #252a38; border: 1px solid var(--border); color: white; }
        .btn-secondary:hover { background: #2d3345; }

        .divider { color: var(--text-muted); font-size: 0.9rem; margin: 10px 0; position: relative; }

        /* اللوبي */
        .room-banner {
            background: linear-gradient(45deg, #1c202d, #252a38); border: 1px solid var(--primary); border-radius: 15px;
            padding: 15px 40px; display: flex; flex-direction: column; align-items: center; margin-bottom: 40px;
            box-shadow: 0 0 20px rgba(245, 130, 32, 0.1);
        }
        .banner-text { color: var(--text-muted); font-size: 0.9rem; font-weight: bold; }
        .banner-code { color: var(--primary); font-size: 3rem; font-weight: 900; letter-spacing: 6px; }

        .teams-container { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; width: 90%; max-width: 1000px; margin-bottom: 30px;}
        .team-panel { background: var(--box-bg); border-radius: 15px; width: 280px; min-height: 250px; border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.3);}
        .panel-head { padding: 15px; text-align: center; font-weight: 900; color: #fff; font-size: 1.2rem; }
        .panel-head.t1 { background: var(--t1-color); }
        .panel-head.t2 { background: var(--t2-color); }
        .panel-head.wait { background: #453b60; }
        .panel-content { padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .player-item { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; font-weight: bold; text-align: center; border: 1px solid var(--border); cursor: pointer; transition: 0.2s;}
        .player-item:hover { background: rgba(255,255,255,0.1); }

        .start-game-btn { width: 90%; max-width: 400px; font-size: 1.5rem; display: none; margin-bottom: 50px;} 

        /* شاشة اللعبة */
        .game-topbar { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 50px; flex-wrap: wrap;}
        .score-badge { display: flex; align-items: center; gap: 15px; background: var(--box-bg); padding: 8px 25px 8px 8px; border-radius: 50px; border: 1px solid var(--border); font-size: 1.3rem; font-weight: bold; }
        .score-badge.t2-badge { padding: 8px 8px 8px 25px; flex-direction: row-reverse; }
        .score-circle { width: 45px; height: 45px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: 900; font-size: 1.5rem; color: #fff; box-shadow: inset 0 -3px 5px rgba(0,0,0,0.3);}
        .t1-badge .score-circle { background: var(--t1-color); }
        .t2-badge .score-circle { background: var(--t2-color); }
        .vs-text { color: var(--text-muted); font-weight: 900; font-size: 1.5rem; }

        /* الخلايا السداسية (احترافية 3D) */
        .honeycomb { display: flex; flex-direction: column; align-items: center; padding-bottom: 50px; filter: drop-shadow(0 15px 20px rgba(0,0,0,0.5));}
        .hex-row { display: flex; justify-content: center; margin-bottom: -22px; }
        .hex-wrap { position: relative; width: 85px; height: 98px; margin: 0 3px; cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .hex-border { position: absolute; inset: 0; background: #2d3345; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); transition: 0.3s; }
        .hex-inner { position: absolute; inset: 4px; background: #ffffff; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); display: flex; justify-content: center; align-items: center; font-size: 2.2rem; font-weight: 900; color: #1c202d; transition: 0.3s; box-shadow: inset 0 -8px 15px rgba(0,0,0,0.15); }
        .hex-wrap:hover { transform: scale(1.1); z-index: 10; }
        .hex-wrap.won-t1 .hex-border { background: #fff; box-shadow: 0 0 20px rgba(217, 108, 58, 0.5);}
        .hex-wrap.won-t1 .hex-inner { background: linear-gradient(to bottom, #ff9b61, var(--t1-color)); color: #fff; text-shadow: 1px 1px 3px rgba(0,0,0,0.4);}
        .hex-wrap.won-t2 .hex-border { background: #fff; box-shadow: 0 0 20px rgba(74, 158, 154, 0.5);}
        .hex-wrap.won-t2 .hex-inner { background: linear-gradient(to bottom, #69ded9, var(--t2-color)); color: #fff; text-shadow: 1px 1px 3px rgba(0,0,0,0.4);}

        .notification { position: fixed; top: 20px; background: #4CAF50; color: white; padding: 15px 30px; border-radius: 10px; font-weight: bold; display: none; z-index: 2000; box-shadow: 0 5px 15px rgba(0,0,0,0.3);}
    </style>
</head>
<body>

    <div id="authScreen" class="screen active">
        <h1 class="main-logo">خلية الحروف</h1>
        <div class="glass-box">
            <div class="box-header">لعب جماعي أونلاين</div>
            <div class="input-wrapper">
                <label>اسمك</label>
                <input type="text" id="playerName" placeholder="mo" value="mo">
            </div>
            <button class="btn btn-primary" id="btnCreateRoom">إنشاء غرفة جديدة ➕</button>
            <div class="divider">أو انضم لغرفة قائمة</div>
            <div class="input-wrapper">
                <input type="text" id="roomCodeInput" placeholder="اكتب كود الغرفة هنا...">
            </div>
            <button class="btn btn-secondary" id="btnJoinRoom">انضم إلى الغرفة 🚪</button>
        </div>
    </div>

    <div id="lobbyScreen" class="screen">
        <h1 class="main-logo small">غرفة الانتظار</h1>
        <div class="room-banner">
            <div class="banner-text">كود الغرفة</div>
            <div class="banner-code" id="displayCode">------</div>
        </div>
        <div class="teams-container">
            <div class="team-panel">
                <div class="panel-head t2">الفريق الثاني (<span id="t2Count">0</span>)</div>
                <div class="panel-content" id="t2List"></div>
            </div>
            <div class="team-panel wait-panel">
                <div class="panel-head wait">قائمة الانتظار</div>
                <div class="panel-content" id="waitList"></div>
            </div>
            <div class="team-panel">
                <div class="panel-head t1">الفريق الأول (<span id="t1Count">0</span>)</div>
                <div class="panel-content" id="t1List"></div>
            </div>
        </div>
        <button class="btn btn-primary start-game-btn" id="btnStartGame">🚀 ابدأ اللعبة الآن</button>
    </div>

    <div id="gameScreen" class="screen">
        <div class="game-topbar">
            <div class="score-badge t1-badge">
                <div class="score-circle" id="scoreT1">0</div>
                <span>الفريق الأول</span>
            </div>
            <div class="vs-text">VS</div>
            <div class="score-badge t2-badge">
                <span>الفريق الثاني</span>
                <div class="score-circle" id="scoreT2">0</div>
            </div>
        </div>
        <div class="honeycomb" id="board"></div>
    </div>

    <div id="notif" class="notification"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC5U1iJdaqEFcrslw2w1ET_23gPo8vSuIo",
            authDomain: "rof-f756a.firebaseapp.com",
            databaseURL: "https://rof-f756a-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "rof-f756a",
            storageBucket: "rof-f756a.firebasestorage.app",
            messagingSenderId: "354363701294",
            appId: "1:354363701294:web:07d38e0bfbf51ac81387bf"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myName = "";
        let currentRoom = "";
        let isHost = false;

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function showNotif(msg, isError = false) {
            const notif = document.getElementById('notif');
            notif.textContent = msg;
            notif.style.background = isError ? '#e74c3c' : '#4CAF50';
            notif.style.display = 'block';
            setTimeout(() => notif.style.display = 'none', 3000);
        }

        document.getElementById('btnCreateRoom').onclick = async () => {
            myName = document.getElementById('playerName').value.trim() || 'المضيف';
            currentRoom = Math.random().toString(36).substring(2, 8).toUpperCase();
            isHost = true;

            const allLetters = ['أ','ب','ت','ث','ج','ح','خ','د','ذ','ر','ز','س','ش','ص','ض','ط','ظ','ع','غ','ف','ق','ك','ل','م','ن','هـ','و','ي'];
            let initialBoard = {};
            allLetters.forEach(l => initialBoard[l] = "empty");

            try {
                await set(ref(db, 'rooms/' + currentRoom), {
                    host: myName, status: 'lobby', scores: { t1: 0, t2: 0 }, board: initialBoard,
                    players: { [myName]: { team: 'wait' } }
                });
                
                document.getElementById('displayCode').textContent = currentRoom;
                document.getElementById('btnStartGame').style.display = 'block'; 
                showScreen('lobbyScreen');
                listenToRoom();
                showNotif("تم إنشاء الغرفة بنجاح!");
            } catch (err) { showNotif("تأكد من فتح قاعدة البيانات في فايربيس", true); }
        };

        document.getElementById('btnJoinRoom').onclick = async () => {
            myName = document.getElementById('playerName').value.trim() || 'لاعب';
            let code = document.getElementById('roomCodeInput').value.trim().toUpperCase();
            if(!code) return showNotif("أدخل الكود!", true);

            try {
                const snapshot = await get(ref(db, 'rooms/' + code));
                if (snapshot.exists()) {
                    currentRoom = code; isHost = false;
                    await update(ref(db, `rooms/${currentRoom}/players`), { [myName]: { team: 'wait' } });
                    document.getElementById('displayCode').textContent = currentRoom;
                    showScreen('lobbyScreen');
                    listenToRoom();
                    showNotif("تم الانضمام للغرفة!");
                } else { showNotif("كود الغرفة غير صحيح", true); }
            } catch (err) { showNotif("خطأ في الاتصال", true); }
        };

        function listenToRoom() {
            onValue(ref(db, 'rooms/' + currentRoom), (snapshot) => {
                const data = snapshot.val();
                if(!data) return;

                updateLobbyUI(data.players, data.host);

                if (data.status === 'playing') {
                    if (!document.getElementById('gameScreen').classList.contains('active')) {
                        buildBoardUI(); showScreen('gameScreen');
                    }
                    document.getElementById('scoreT1').textContent = data.scores.t1;
                    document.getElementById('scoreT2').textContent = data.scores.t2;
                    updateBoardUI(data.board);
                }
            });
        }

        function updateLobbyUI(players, hostName) {
            const waitList = document.getElementById('waitList');
            const t1List = document.getElementById('t1List');
            const t2List = document.getElementById('t2List');
            
            waitList.innerHTML = ''; t1List.innerHTML = ''; t2List.innerHTML = '';
            let c1 = 0, c2 = 0;

            Object.keys(players).forEach(pName => {
                let p = players[pName];
                let div = document.createElement('div');
                div.className = 'player-item';
                div.textContent = pName + (pName === hostName ? ' 👑' : '');

                if (isHost) {
                    div.onclick = () => {
                        let nextTeam = p.team === 'wait' ? 't1' : p.team === 't1' ? 't2' : 'wait';
                        update(ref(db, `rooms/${currentRoom}/players/${pName}`), { team: nextTeam });
                    };
                }

                if (p.team === 'wait') waitList.appendChild(div);
                else if (p.team === 't1') { t1List.appendChild(div); c1++; }
                else if (p.team === 't2') { t2List.appendChild(div); c2++; }
            });

            document.getElementById('t1Count').textContent = c1;
            document.getElementById('t2Count').textContent = c2;
        }

        document.getElementById('btnStartGame').onclick = () => {
            update(ref(db, `rooms/${currentRoom}`), { status: 'playing' });
        };

        const rowLayout = [6, 5, 6, 5, 6];
        const allLetters = ['أ','ب','ت','ث','ج','ح','خ','د','ذ','ر','ز','س','ش','ص','ض','ط','ظ','ع','غ','ف','ق','ك','ل','م','ن','هـ','و','ي'];

        function buildBoardUI() {
            const board = document.getElementById('board');
            if (board.innerHTML !== '') return;
            
            let letterIdx = 0;
            rowLayout.forEach(count => {
                let row = document.createElement('div');
                row.className = 'hex-row';
                for (let i = 0; i < count; i++) {
                    if (letterIdx < allLetters.length) {
                        let l = allLetters[letterIdx];
                        let wrap = document.createElement('div');
                        wrap.className = 'hex-wrap';
                        wrap.id = 'hex-' + l;
                        wrap.innerHTML = `<div class="hex-border"></div><div class="hex-inner">${l}</div>`;
                        
                        if (isHost) wrap.onclick = () => handleCellClick(l);
                        
                        row.appendChild(wrap);
                        letterIdx++;
                    }
                }
                board.appendChild(row);
            });
        }

        function updateBoardUI(boardData) {
            allLetters.forEach(l => {
                let cell = document.getElementById('hex-' + l);
                if(cell) {
                    cell.className = 'hex-wrap'; 
                    if(boardData[l] === 't1') cell.classList.add('won-t1');
                    if(boardData[l] === 't2') cell.classList.add('won-t2');
                }
            });
        }

        async function handleCellClick(letter) {
            const snap = await get(ref(db, `rooms/${currentRoom}/board/${letter}`));
            let state = snap.val();
            let newState = state === "empty" ? "t1" : state === "t1" ? "t2" : "empty";
            
            update(ref(db, `rooms/${currentRoom}/board`), { [letter]: newState });
            
            const boardSnap = await get(ref(db, `rooms/${currentRoom}/board`));
            let t1Score = 0, t2Score = 0;
            Object.values(boardSnap.val()).forEach(val => {
                if (val === 't1') t1Score++;
                if (val === 't2') t2Score++;
            });
            update(ref(db, `rooms/${currentRoom}/scores`), { t1: t1Score, t2: t2Score });
        }
    </script>
</body>
</html>
